[pytest]
# Résolution des imports locaux
pythonpath = .

# Règles de découverte des tests
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configuration de la sortie console
addopts = -v --tb=short

# Filtres d'avertissements (optionnel, pour maintenir des logs propres lors de l'usage de librairies tierces)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
